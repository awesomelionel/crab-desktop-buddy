<h2>Just the pupils — white squares on black</h2>
<p class="subtitle">10 px blocks. How big should each pupil square be?</p>

<div class="cards">

  <div class="card" data-choice="3x3" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#000;padding:8px;display:flex;justify-content:center;align-items:center;">
      <canvas id="c1" width="240" height="135" style="image-rendering:pixelated;width:240px;height:135px;display:block;border:1px solid #222"></canvas>
    </div>
    <div class="card-body"><h3>3×3 blocks (30×30 px)</h3><p>Small, beady. Very minimal.</p></div>
  </div>

  <div class="card" data-choice="4x4" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#000;padding:8px;display:flex;justify-content:center;align-items:center;">
      <canvas id="c2" width="240" height="135" style="image-rendering:pixelated;width:240px;height:135px;display:block;border:1px solid #222"></canvas>
    </div>
    <div class="card-body"><h3>4×4 blocks (40×40 px)</h3><p>Chunky. Matches the reference character feel.</p></div>
  </div>

  <div class="card" data-choice="5x5" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#000;padding:8px;display:flex;justify-content:center;align-items:center;">
      <canvas id="c3" width="240" height="135" style="image-rendering:pixelated;width:240px;height:135px;display:block;border:1px solid #222"></canvas>
    </div>
    <div class="card-body"><h3>5×5 blocks (50×50 px)</h3><p>Bold. Eyes dominate the screen.</p></div>
  </div>

</div>

<script>
const PX = 10;
const GAP_BLOCKS = 6; // gap between eyes in blocks

function drawPupils(id, blocks) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  const W = 240, H = 135;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const size = blocks * PX;
  const gap = GAP_BLOCKS * PX;
  const totalW = size * 2 + gap;
  const ox = Math.floor((W - totalW) / 2);
  const oy = Math.floor((H - size) / 2);

  ctx.fillStyle = '#fff';
  ctx.fillRect(ox, oy, size, size);
  ctx.fillRect(ox + size + gap, oy, size, size);
}

drawPupils('c1', 3);
drawPupils('c2', 4);
drawPupils('c3', 5);
</script>
